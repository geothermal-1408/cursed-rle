name: Linux Build and Test

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-linux-x86:
    name: Ubuntu x86_64 (Scalar)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      # Update package lists and install clang and ncurses development files
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libncurses-dev pkg-config

    - name: Build Project (make all)
      run: make all

    - name: Run Tests
      # Assuming your 'test' target compiles and runs the test binary
      run: make test

    - name: Run Scalar Benchmark
      # Tests the fallback scalar logic since this is an x86 runner
      run: make bench_scalar
