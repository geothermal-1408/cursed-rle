name: Linux Build and Test

# Trigger the workflow on pushes and pull requests to the main branches
# on:
#   push:
#     branches: [ "main", "master" ]
#   pull_request:
#     branches: [ "main", "master" ]
on:
  workflow_dispatch:
jobs:
  # Job 1: Standard x86_64 Runner (Tests Scalar Fallback)
  build-linux-x86:
    name: Ubuntu x86_64 (Scalar)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libncurses-dev pkg-config

    - name: Build Project
      run: make all

    # - name: Run Tests
    #   run: make test

    - name: Run Scalar Benchmark
      run: make bench_scalar

  # Job 2: ARM64 Runner (Tests NEON SIMD)
  build-linux-arm64:
    name: Ubuntu ARM64 (NEON)
    runs-on: ubuntu-24.04-arm 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libncurses-dev pkg-config

    - name: Build Project
      run: make all

    # - name: Run Tests
    #   run: make test

    - name: Run NEON Benchmark
      run: make bench_neon
